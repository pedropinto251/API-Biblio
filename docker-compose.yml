version: '3'

services:
  db:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "1433:1433"
    environment:
      SA_PASSWORD: A_Sua_Password
      ACCEPT_EULA: "Y"
    volumes:
      - sql-data:/var/opt/mssql

  sonarqube:
    image: sonarqube:latest
    container_name: sonarqube
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    ports:
      - "9000:9000"
    networks:
      - sonarnet

  jenkins:
    image: jenkins/jenkins
    ports:
      - "8080:8080"
    restart: always
    container_name: jenkins

networks:
  sonarnet:
    driver: bridge

volumes:
  sql-data:
